<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="styles/style.css" type="text/css" media="screen" title="no title" charset="utf-8">
    <script charset="utf-8" src="scripts/script.js" defer>
        
    </script>
    <title>Etch-a-Sketch</title>

</head>
<body>
    
    <section>

        <div id="pad-customization">
            <div>
                <label for="pen-color">Pen Color: </label>
                <input type="color" name="penColor" value="#ffffff" id="pen-color" placeholder="white"/>
            </div>
            <div>
                <label for="pad-color">Pad Color: </label>
                <input type="color" name="padColor" value="#000000" id="pad-color" placeholder="black"/>
            </div>
            <div>
                <div>
                    <label for="pixel-number">Pixels: </label>
                    <input type="number" name="pixelNumber" value="20" id="pixel-number" min="1" max="100" placeholder="20"/>
                </div>
                <div>
                    <button id="pixel-submit">Changes Pixels</button>
                </div>
            </div>
            <div>
                <button id="clear-button">Clear</button>
            </div>
        </div>

        <div class="container"></div>

    </section>
    
</body>
</html>
